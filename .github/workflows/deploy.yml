name: $bog_blitz_app

permissions: write-all

on:
    workflow_dispatch:
    push:
    pull_request:
    schedule:
        - cron: "0 7 * * *"

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: hyoo-ru/mam_build@master2
              with:
                  package: "bog/blitz"
                  modules: "app"
                  
            - uses: b-on-g/mol-prerender-action@main
              if: github.ref == 'refs/heads/master'
              with:
                  base-url: "https://b-on-g.github.io/blitz/"
                  screens: |
                      campaign-example-for-organic-articles-seo


            - uses: hyoo-ru/gh-deploy@v4.4.1
              if: github.ref == 'refs/heads/master'
              with:
                  folder: "bog/blitz/app/-"
