name: $bog_blitz_app

permissions: write-all

on:
    workflow_dispatch:
    push:
    pull_request:
    delete:
    schedule:
        - cron: "0 7 * * *"

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: hyoo-ru/mam_build@master2
              with:
                  package: "bog/blitz"

            - name: Build blog
              if: github.ref == 'refs/heads/master'
              run: npx mam bog/blitz/blog

            - name: Merge blog into app
              if: github.ref == 'refs/heads/master'
              run: cp -r bog/blitz/blog/-/* bog/blitz/-/blog/ || mkdir -p bog/blitz/-/blog && cp -r bog/blitz/blog/-/* bog/blitz/-/blog/

            - uses: b-on-g/mol-prerender-action@main
              if: github.ref == 'refs/heads/master'
              with:
                  folder: "bog/blitz/-/blog"
                  base-url: "https://b-on-g.github.io/blitz/blog/"
                  screens: |
                      about
                      guide
                      features

            - uses: hyoo-ru/gh-deploy@v4.4.1
              if: github.ref == 'refs/heads/master'
              with:
                  folder: "bog/blitz/-"

            - name: Deploy feature branch
              if: startsWith(github.ref, 'refs/heads/feature/')
              uses: hyoo-ru/gh-deploy@v4.4.1
              with:
                  folder: "bog/blitz/-"
                  target-folder: ${{ github.ref_name }}

    cleanup:
        if: github.event_name == 'delete' && startsWith(github.event.ref, 'feature/')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: gh-pages

            - name: Remove feature folder
              run: |
                  BRANCH_NAME="${{ github.event.ref }}"
                  FOLDER="feature/${BRANCH_NAME#feature/}"
                  if [ -d "$FOLDER" ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git rm -rf "$FOLDER"
                    git commit -m "Clean up preview for deleted branch: $BRANCH_NAME"
                    git push
                  fi

